name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff
        run: poetry run ruff check src tests

      - name: Mypy
        run: poetry run mypy src

      - name: Pytest
        run: poetry run pytest --ignore=tests/e2e

      - name: Epic line budget
        run: poetry run python scripts/check_epic_size.py --base-ref origin/main

      - name: Generate icon
        run: poetry run python scripts/generate_icon.py

      - name: PyInstaller smoke build
        run: poetry run pyinstaller mggist.spec --noconfirm

      - name: Verify executable artifact
        run: |
          if (-not (Test-Path dist/MGGIST.exe)) { throw "dist/MGGIST.exe missing" }

      - name: Install Playwright Chromium
        run: poetry run playwright install chromium

      - name: E2E tests
        run: poetry run pytest tests/e2e -m e2e --no-cov
