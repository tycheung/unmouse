name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry>=1.8,<3"
          poetry --version

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.10-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.10-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff
        run: poetry run ruff check src tests

      - name: Mypy
        run: poetry run mypy src

      - name: Pytest
        run: poetry run pytest --ignore=tests/e2e

      - name: Epic line budget
        run: poetry run python scripts/check_epic_size.py --base-ref origin/main

      - name: Generate icon
        run: poetry run python scripts/generate_icon.py

      - name: PyInstaller smoke build
        run: poetry run pyinstaller mggist.spec --noconfirm

      - name: Verify executable artifact
        run: |
          if (-not (Test-Path dist/MGGIST.exe)) { throw "dist/MGGIST.exe missing" }

      - name: Install Playwright Chromium
        run: poetry run playwright install chromium

      - name: E2E tests
        run: poetry run pytest tests/e2e -m e2e --no-cov
