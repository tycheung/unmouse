<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>unmouse</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="panel.js"></script>
    <script defer src="alpine.min.js"></script>
  </head>
  <body x-data="panelApp()" x-init="init()">
    <div class="panel">
      <header class="panel-header"><h1>unmouse</h1></header>
      <section class="actions" x-show="view === 'main'" x-cloak>
        <button type="button" @click="checkUpdates()" :disabled="busy">
          Update Software
          <span class="update-badge" x-show="updateAvailable" aria-hidden="true"></span>
        </button>
        <button type="button" @click="openSettings()" :disabled="busy">Settings</button>
        <button type="button" @click="calibrate()" :disabled="busy">Calibrate</button>
        <button type="button" @click="trainGestures()" :disabled="busy">Train Gestures</button>
        <button type="button" @click="togglePause()" :disabled="busy || !status.tracking" x-show="status.tracking">Pause / Resume</button>
        <button type="button" class="primary" @click="status.tracking ? stopTracking() : launch()" :disabled="busy" x-text="status.tracking ? 'Stop Tracking' : 'Launch'"></button>
      </section>
      <section class="settings-view" x-show="view === 'settings'" x-cloak>
        <h2>Settings</h2>
        <label class="field">Profile
          <select x-model="settingsForm.profile_name" @change="activateProfile()">
            <template x-for="name in settingsForm.profiles" :key="name">
              <option :value="name" x-text="name"></option>
            </template>
          </select>
        </label>
        <div class="profile-actions">
          <input type="text" x-model="newProfileName" placeholder="New profile" />
          <button type="button" @click="createProfile()" :disabled="busy">Create</button>
          <button type="button" @click="renameProfile()" :disabled="busy">Rename</button>
          <button type="button" class="danger" @click="deleteProfile()" :disabled="busy">Delete</button>
        </div>
        <label class="field">Calibration points
          <input type="range" min="4" max="49" step="1" x-model.number="settingsForm.gaze_calibration_points" />
          <span x-text="settingsForm.gaze_calibration_points"></span>
        </label>
        <label class="field">Fixation threshold
          <input type="range" min="0.1" max="1" step="0.05" x-model.number="settingsForm.fixation_threshold" />
          <span x-text="settingsForm.fixation_threshold"></span>
        </label>
        <label class="field">Snap radius (px)
          <input type="range" min="10" max="150" step="5" x-model.number="settingsForm.snap_radius_px" />
          <span x-text="settingsForm.snap_radius_px"></span>
        </label>
        <label class="field">Scroll speed
          <input type="range" min="0.25" max="2" step="0.05" x-model.number="settingsForm.scroll_speed_multiplier" />
          <span x-text="settingsForm.scroll_speed_multiplier"></span>
        </label>
        <label class="field">Camera index
          <input type="number" min="0" max="9" x-model.number="settingsForm.camera_index" />
        </label>
        <label class="field">Gaze mode
          <select x-model="settingsForm.gaze_mode">
            <option value="cursor_follow">Cursor follow</option>
            <option value="gaze_only">Gaze only</option>
          </select>
        </label>
        <label class="field">Pause hotkey
          <input type="text" x-model="settingsForm.pause_hotkey" placeholder="ctrl+shift+p" />
        </label>
        <div class="settings-actions">
          <button type="button" class="primary" @click="saveSettings()" :disabled="busy">Save</button>
          <button type="button" class="back-link" @click="goMain()">← Back</button>
        </div>
      </section>
      <section class="enrollment-view" x-show="view === 'enrollment'" x-cloak>
        <h2>Train Gestures</h2>
        <p class="enrollment-progress" x-text="'Gesture ' + (enrollment.gesture_index + 1) + '/' + enrollment.gesture_count"></p>
        <p class="enrollment-label" x-show="enrollment.gesture_label" x-text="enrollment.gesture_label"></p>
        <p class="enrollment-instruction" x-text="enrollment.instruction"></p>
        <img class="enrollment-preview" x-show="enrollmentPreview" :src="enrollmentPreview ? 'data:image/jpeg;base64,' + enrollmentPreview : ''" alt="Camera preview" />
        <p class="enrollment-note" x-show="enrollmentPreviewMessage" x-text="enrollmentPreviewMessage"></p>
        <div class="actions">
          <button type="button" class="primary" @click="captureEnrollment()" :disabled="busy || enrollment.done">Capture (hold 1s)</button>
          <button type="button" class="back-link" @click="leaveEnrollment()">← Back</button>
        </div>
      </section>
      <section class="onboarding-view" x-show="view === 'onboarding'" x-cloak>
        <div class="onboarding-progress" x-text="'Step ' + (onboarding.step_index + 1) + '/' + onboarding.step_count"></div>
        <h2 x-text="onboarding.title"></h2>
        <p x-text="onboarding.description"></p>
        <p class="onboarding-note" x-show="onboarding.notice" x-text="onboarding.notice"></p>
        <div class="actions">
          <template x-for="action in onboarding.actions" :key="action.id">
            <button type="button" :class="action.primary ? 'primary' : ''" :disabled="busy || !action.enabled" @click="runOnboardingAction(action.id)" x-text="action.label"></button>
          </template>
          <button type="button" class="back-link" x-show="onboarding.skippable" @click="showSkipConfirm = true">Skip this step</button>
        </div>
        <div class="skip-dialog" x-show="showSkipConfirm">
          <p x-text="onboarding.skip_warning"></p>
          <button type="button" @click="showSkipConfirm = false">Cancel</button>
          <button type="button" class="danger" @click="confirmSkip()">Skip anyway</button>
        </div>
      </section>
      <footer class="status-bar">
        <span class="status-pill" :class="status.tracking ? 'on' : 'off'" x-text="status.tracking ? (status.paused ? 'Paused' : 'Tracking') : 'Idle'"></span>
        <span class="conf-wrap" x-show="status.tracking && status.fixation != null">
          <span class="conf-label">Focus</span>
          <span class="conf-bar"><span class="conf-fill" :style="'width:' + Math.round((status.fixation ?? 0) * 100) + '%'"></span></span>
        </span>
        <span class="metric" x-show="status.tracking && status.fps != null" x-text="status.fps.toFixed(1) + ' fps'"></span>
        <span class="metric" x-show="status.last_calibrated" x-text="'Cal ' + status.last_calibrated"></span>
        <span class="message" x-text="statusMessage"></span>
        <span class="error" x-show="errorMessage" x-text="errorMessage"></span>
      </footer>
    </div>
  </body>
</html>
